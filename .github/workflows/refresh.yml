name: Refresh data

on:
  schedule:
    # Every 2 hours, on the hour (UTC). GitHub Actions does not guarantee
    # exact timing — runs may be delayed during peak load.
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call refresh endpoint
        env:
          REFRESH_URL: ${{ secrets.REFRESH_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          if [ -z "$REFRESH_URL" ]; then
            echo "REFRESH_URL secret not set" >&2
            exit 1
          fi
          curl --fail --show-error --silent \
            --max-time 120 \
            -H "Authorization: Bearer $REFRESH_TOKEN" \
            "$REFRESH_URL"
